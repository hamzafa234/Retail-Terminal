<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomberg Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            padding: 40px;
        }

        .logo {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 45px;
        }

        .login-container {
            max-width: 350px;
        }

        label {
            display: block;
            font-size: 26px;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            background-color: #ff9933;
            border: none;
            margin-bottom: 24px;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: 2px solid #ffaa55;
        }

        button {
            background-color: #666;
            color: #fff;
            border: none;
            padding: 12px 50px;
            font-size: 26px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 60px;
        }

        button:hover {
            background-color: #777;
        }

        .forgot-link {
            color: #00bfff;
            font-size: 26px;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="logo">Retail Terminal</div>
    
    <div class="login-container">
        <form>
            <label for="username">Login Name</label>
            <input type="text" id="username" name="username">
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password">
            
            <button type="submit">Login</button>
        </form>
        
        <a href="#" class="forgot-link">Forgot Login Name or Password?</a>
    </div>
</body>
</html>
